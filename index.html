<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>スーパーおかいものマスター</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      min-height: 100%;
      background: #7ec8e8;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: var(--app-height, 100svh);
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      box-sizing: border-box;
    }
    canvas {
      width: min(768px, 100vw, calc(var(--app-height, 100svh) * 256 / 224));
      height: auto;
      max-height: var(--app-height, 100svh);
      aspect-ratio: 256 / 224;
      background: #7ec8e8;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
      touch-action: none;
    }
    @media (max-width: 430px) and (orientation: portrait) {
      body {
        align-items: flex-start;
        justify-content: center;
        padding-top: max(env(safe-area-inset-top), 6px);
      }
      canvas {
        width: 100vw;
        max-width: 100vw;
        margin-top: 0;
      }
    }
    @media (max-width: 430px) and (orientation: landscape) {
      canvas {
        width: auto;
        height: var(--app-height, 100svh);
        max-width: 100vw;
      }
    }
  </style>
</head>

    ctx.setTransform(HI_SCALE, 0, 0, HI_SCALE, 0, 0);

    ctx.setTransform(1, 0, 0, 1, 0, 0);

  function btext(str, x, y, color, scale) {
    scale = scale || 1;
    str = String(str).toUpperCase();
    for (let i = 0; i < str.length; i++) {
      const glyph = BF[str[i]] || BF[" "];
      for (let r = 0; r < glyph.length; r++) {
        for (let c = 0; c < 3; c++) if (glyph[r][c] === "1") rect(x + i * 4 * scale + c * scale, y + r * scale, scale, scale, color || C.ink);
      }
    }
  }

  function drawArt(art, x, y, pal, scale, tint) {
    scale = scale || 1;
    for (let r = 0; r < art.length; r++) {
      const row = art[r]; if (!row) continue;
      for (let c = 0; c < row.length; c++) {
        const base = pal[row[c]];
        if (base) rect(x + c*scale, y + r*scale, scale, scale, tint || base);
      }
    }
  }
  function flipArt(art) { return art.map(function (r) { return r.split("").reverse().join(""); }); }

  // パーティクル(約定の火花・完売の紙吹雪)
  const fx = [];
  function spawnFx(x, y, n, cols, spd) {
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2, v = (0.4 + Math.random()) * (spd || 1.5);
      fx.push({ x:x, y:y, vx:Math.cos(a)*v, vy:Math.sin(a)*v - 0.7, life: 16 + ((Math.random()*16)|0), col: cols[(Math.random()*cols.length)|0] });
    }
  }
  function updateFx() {
    for (let i = fx.length - 1; i >= 0; i--) {
      const p = fx[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.life--;
      if (p.life <= 0) fx.splice(i, 1);
    }
  }

    for (let i = 0; i < fx.length; i++) {

  function addPopup(text, x, y, col) {
    battle.popups.push({ text: text, x: x, y: y, life: 88, col: col || "#7dffb0", vy: -0.35 });
  }
  function updatePopups() {
    for (let i = battle.popups.length - 1; i >= 0; i--) {
      const p = battle.popups[i];
      p.y += p.vy;
      p.life--;
      if (p.life <= 0) battle.popups.splice(i, 1);
    }
  }
  function drawPopups() {
    for (let i = 0; i < battle.popups.length; i++) {
      const p = battle.popups[i];
      ctx.globalAlpha = Math.min(1, p.life / 28);
      drawNumber(p.text, p.x, p.y, p.col);

    trend: 0,                  // 直近の傾き(+1↑ / -1↓ / 0)

  function setPages(pages, next) { battle.pages = pages; battle.pi = 0; battle.typed = 0; battle.next = next || null; }
  function curPage() { return battle.pages[battle.pi] || ["", ""]; }
  function pageLen() { const p = curPage(); return (p[0]||"").length + (p[1]||"").length; }

  function applyStat(obj) {
    for (const k in obj) {
      const max = STAT_MAX[k] || 999;
      game.stats[k] = Math.max(0, Math.min(max, (game.stats[k]||0) + obj[k]));
    }
  }

  function startBattle() {
    battle.book = 0; battle.shown = 0;
    battle.remaining = SIZE; battle.shownRemaining = SIZE;
    battle.rate = 6; battle.trend = 0; battle.turn = 1; battle.momentum = 0;
    battle.combo = 0; battle.cfoMood = 55; battle.popups = [];
    battle.cursor = 0; battle.phase = "intro";
    battle.pending = null; battle.animT = 0; battle.animHit = false;
    battle.screenShake = 0; battle.dealFlash = 0;
    battle.ticketT = 0; battle.ticketAmount = 0; battle.ticketName = ""; battle.ticketCrit = false;
    game.stats = { stamina:102, nemawashi:20, review:25, demand:0, trust:40, spread:115, market:55 };
    setPages([
      ["100億円 シニア社債の マンデート！", ""],
      ["販売残高は 100億円。", "投資家オーダーで 完売をめざせ。"],
      ["地合いを読み、勢いに乗れ。", "主幹事の腕の 見せどころだ。"]
    ], toCommand);
  }
  function toCommand() {
    battle.phase = "command";
    setPages([["コマンドを えらべ。", ""]], null);
  }

  // -------------------------------------------------- コマンド(ブックビルディング)
  function resolveCommand(id) {
    applyStat({ stamina:-2 });          // 1ターンの基礎消耗(時間経過)
    let imm = 0;                        // このターンの追加オーダー(億)
    let pages = [];

    if (id === "widen") {
      applyStat({ stamina:-9, spread:5, nemawashi:4 });
      battle.rate = Math.min(18, battle.rate + 3);
      battle.trend = 1;
      pages = [["スプレッドを ワイドに 振った！", ""],
               ["気力 -9 ／ 必殺ゲージ +4", "需要トレンド ↑"]];
    } else if (id === "tighten") {
      applyStat({ stamina:11, spread:-5, nemawashi:2 });
      battle.rate = Math.max(0, battle.rate - 3);
      battle.trend = -1;
      pages = [["スプレッドを タイトに 寄せた", ""],
               ["気力 回復 ／ 必殺ゲージ +2", "需要トレンド ↓"]];
    } else if (id === "explain") {
      applyStat({ stamina:-3, trust:4, nemawashi:12 });
      battle.rate = Math.min(18, battle.rate + 1);
      battle.trend = 1; imm = 2;
      pages = [["ロードショーで 投資家を 口説いた", ""],
               ["発行体信頼と 必殺ゲージが あがった", ""]];
    } else if (id === "nemawashi") {
      if (game.stats.nemawashi < 35) {
        applyStat({ stamina:2 });
        battle.pending = { amount:0, noTurn:true,
          pages:[["必殺オーダーには", "必殺ゲージが たりない！"]] };
        return;
      }
      applyStat({ stamina:-22, nemawashi:-35 });
      battle.trend = 0; imm = 28;
      battle.cfoMood = Math.min(100, battle.cfoMood + 12);
      pages = [["必殺オーダーを たたき込んだ！", ""],
               ["大型オーダー！ 気力とゲージを消費", ""]];
    } else if (id === "hold") {
      applyStat({ stamina:10, market:5, trust:2 });
      battle.rate = Math.max(0, battle.rate - 2);
      battle.trend = 0;
      battle.cfoMood = Math.min(100, battle.cfoMood + 4);
      pages = [["市場を 見送り 様子を見た。", ""],
               ["気力回復 ／ 地合いが 少し落ち着いた", ""]];
    }

    if (id === "widen") battle.cfoMood = Math.max(0, battle.cfoMood - 10);
    else if (id === "tighten") battle.cfoMood = Math.min(100, battle.cfoMood + 8);
    else if (id === "explain") battle.cfoMood = Math.min(100, battle.cfoMood + 5);

    const inv = currentInvestor();
    const prefMatch = inv.pref === id;

    // このターンに入る投資家オーダー(億)。地合い・勢い・投資家好み・スプレッドで変わる
    const mul = 0.6 + (game.stats.market / 100) * 0.8;
    let orders = Math.round((battle.rate + battle.momentum * 2) * mul * investorBonus(id)) + imm + ((Math.random()*3) | 0);
    // スプレッド105-125bp = 絶妙ゾーン(タイトだが通る)
    if (game.stats.spread >= 105 && game.stats.spread <= 125) orders = Math.ceil(orders * 1.22);
    let critical = false;
    const critChance = 0.12 + battle.cfoMood / 400 + (prefMatch ? 0.08 : 0);
    if (orders > 0 && Math.random() < critChance) { critical = true; orders = Math.ceil(orders * 1.65); }
    if (orders >= 8) battle.combo = Math.min(5, battle.combo + 1);
    else battle.combo = 0;
    if (battle.combo >= 2) orders += battle.combo * 2;
    orders = Math.min(battle.remaining, Math.max(0, orders));
    applyStat({ demand: orders });

    // 勢い(モメンタム): 大口が続くと 需要が需要を呼ぶ
    if (orders >= 10) battle.momentum = Math.min(3, battle.momentum + 1);
    else if (orders < 6) battle.momentum = 0;

    const after = battle.book + orders;
    const remainAfter = Math.max(0, SIZE - after);
    if (prefMatch) pages = pages.concat([["" + inv.name + " の好みに 合致！", "オーダーが 伸びやすい"]]);
    if (critical) pages = pages.concat([["クリティカル！ 大口オーダー！！", "CFOも うなずいた"]]);
    if (battle.combo >= 2) pages = pages.concat([["連続好調 x" + battle.combo + "！", "勢いボーナス +" + (battle.combo * 2) + "億"]]);
    pages = pages.concat([[
      "投資家オーダー +" + orders + "億円",
      "販売残高 " + remainAfter + "億円"
    ]]);

    // ターンのおわりに 地合いがゆらぎ、ニュースが飛び込む
    applyStat({ market: ((Math.random() * 13) | 0) - 6 });
    const news = rollNews();
    if (news) { news.fx(); pages = pages.concat([["【ニュース】" + news.label[0], news.label[1]]]); }

    battle.pending = { amount: orders, critical: critical, pages: pages };
  }

  function chooseCommand() {
    resolveCommand(COMMANDS[battle.cursor].id);
    if (battle.pending && battle.pending.noTurn) {
      battle.phase = "result";
      setPages(battle.pending.pages, function () { toCommand(); });
      battle.pending = null;
      return;
    }
    battle.phase = "dealAnim";
    battle.animT = 0; battle.animHit = false;
  }

  function toWin() {
    battle.phase = "win";
    spawnFx(128, 60, 40, ["#facc15","#7dffb0","#fff7d8","#ff9a5c"], 2.6);
    setPages([
      ["販売残高 0億円！", ""],
      ["100億円 完売 ―― 起債 成立！", ""]
    ], function () { startEnding("win"); });
  }
  function toLose(reason) {
    battle.phase = "lose";
    ending.reason = reason;
    const head = reason === "time" ? ["条件決定の機を のがした……", "(ターン切れ)"]
                                   : ["気力が つきはてた……", ""];
    setPages([
      head,
      ["案件は いったん 見送りに……", ""]
    ], function () { startEnding("lose"); });
  }

  function drawCharacters() {
    // 発行体CFO (左中央)
    const cfoFrame = (Math.floor(game.tick / 24) % 4);
    const ex = 40 + (cfoFrame === 1 ? 1 : cfoFrame === 3 ? -1 : 0);
    const ey = 36 + (cfoFrame === 2 ? 1 : 0);
    drawShadow(64, 103, 46);
    drawArt(SPR_CFO, ex, ey, P, 2);
    drawCfoFineDetails(ex, ey);
    // CFO満足度オーラ(SFC後期の敵キャラ光)
    if (battle.cfoMood >= 70 && (game.tick >> 3) % 2 === 0) {
      ctx.fillStyle = "rgba(125,255,176,0.12)";
      ctx.fillRect(ex - 4, ey - 2, 56, 72);
    } else if (battle.cfoMood <= 30 && (game.tick >> 2) % 2 === 0) {
      ctx.fillStyle = "rgba(239,68,68,0.14)";
      ctx.fillRect(ex - 4, ey - 2, 56, 72);
    }
    // CFOの手元: 書類確認と小さな頷き
    if (cfoFrame === 2) rect(ex + 6, ey + 58, 9, 2, "#eef2f7");

    // 主幹事担当者: 電話と端末入力で約定を取る
    const work = battle.phase === "dealAnim";
    const tap = work ? (Math.floor(battle.animT / 4) % 2) : (Math.floor(game.tick / 28) % 2);
    const hx = 196 + (tap ? 1 : 0);
    const hy = 64 + (tap && !work ? 1 : 0);
    drawShadow(215, 113, 36);
    const sx = battle.screenShake>0 ? ((game.tick%2)?1:-1) : 0;
    drawArt(SPR_HERO, hx + sx, hy, P, 2);

    rect(hx - 10, hy + 46, 28, 10, "#111827");
    rect(hx - 8, hy + 48, 24, 5, "#0a1026");

  function drawNumber(str, x, y, color) {
    ctx.font = "bold 12px 'MS Gothic','Courier New',monospace";

    ctx.fillText(str, x-1, y); ctx.fillText(str, x+1, y);

  function drawEffects() {
    if (battle.ticketT > 0) {
      const total = ORDER_TICKET_DURATION;
      const t = total - battle.ticketT;
      const fly = Math.min(1, t / 58);
      const ease = 1 - Math.pow(1 - fly, 3);
      const absorb = Math.max(0, Math.min(1, (t - 142) / 26));
      const w = 82, h = 30;
      const x = Math.round(-90 + 166 * ease + absorb * 18);
      const y = Math.round(48 + Math.sin(t / 7) * 2 - absorb * 4);
      rect(x + 3, y + 3, w, h, "rgba(0,0,0,0.35)");
      rect(x - 2, y - 2, w + 4, h + 4, "#3a2410");
      rect(x - 1, y - 1, w + 2, h + 2, "#caa15a");
      rect(x, y, w, h, "#fff7d8");
      rect(x, y, w, 4, "#facc15");
      rect(x, y + h - 4, w, 4, "#d9a441");
      rect(x + 5, y + 9, w - 10, 1, "#cdd4e0");
      rect(x + 5, y + 21, w - 10, 1, "#cdd4e0");
      btext("ORDER TICKET", x + 8, y + 6, "#7c2d12", 1);
      btext(battle.ticketName || "INVESTOR", x + 8, y + 14, "#1f2937", 1);
      text("+" + battle.ticketAmount + "億円", x + 8, y + 22, "#1e3a8a", 9);
      if (battle.ticketCrit) {
        rect(x + w - 17, y + 3, 14, 14, "#991b1b");
        rect(x + w - 16, y + 4, 12, 12, "#ef4444");
        text("大", x + w - 15, y + 6, "#fff7d8", 9);
      }
      // 着地後しばらく読ませてから、ブック側へ吸収される光のラインを出す。
      if (t > 96) {
        const pulse = (game.tick >> 2) % 2;
        const lx = Math.min(170, x + w + Math.max(0, t - 96) * 2);
        rect(x + w, y + 15, lx - (x + w), 2, pulse ? "#7dffb0" : "#facc15");
        rect(153, 94, 23, 13, "#f4f5f7");
        rect(154, 95, 21, 11, "#cdd4e0");
        btext("BOOK", 157, 98, "#1e3a8a", 1);
      }
    }
    if (battle.dealFlash > 0) {
      ctx.fillStyle = "rgba(255,240,168,0.30)";
      ctx.fillRect(0, 0, VW, 128);
    }
    if (battle.phase === "win") {
      rect(50, 45, 156, 38, "rgba(2,6,23,0.88)");
      rect(52, 47, 152, 34, "#caa15a");
      rect(54, 49, 148, 30, "#0a0e22");
      btext("SOLD OUT", 75, 55, "#fff0a8", 2);
      btext("100 OKU COMPLETE", 72, 72, "#7dffb0", 1);
    }
    drawFx();
    drawPopups();
  }

  // =======================================================================
  //  描画: タイトル / オープニング(オリジナル16bit JRPG風)
  // =======================================================================
  function titleDither(x, y, w, h, c1, c2, step, phase) {
    // 低解像度に見せるためではなく、SFC風に大面積の色面を分割する粒状パターン。
    for (let yy = y; yy < y + h; yy += step) {
      for (let xx = x + ((yy + phase) % (step * 2) === 0 ? 0 : step); xx < x + w; xx += step * 2) {
        rect(xx, yy, 1, 1, ((xx + yy + phase) % 3) ? c1 : c2);
      }
    }
  }

  function titleSky() {
    // 256x224の中に多段の暖色空を作る。実機風に線形グラデではなく帯で表現。
    const bands = ["#321a40", "#5b2643", "#884038", "#b75d2e", "#dd7a32", "#f0a24b", "#f4c26a"];
    for (let i = 0; i < bands.length; i++) rect(0, i * 18, VW, 18, bands[i]);
    rect(0, 126, VW, 20, "#b95d31");
    titleDither(0, 0, VW, 76, "#49214a", "#6b3142", 3, 1);
    titleDither(0, 76, VW, 70, "#d07335", "#f0b15c", 4, 2);
    // 夕日と雲
    rect(184, 28, 34, 34, "#ffd27a"); rect(180, 34, 42, 22, "#ffd27a"); rect(188, 24, 26, 42, "#ffd27a");
    rect(186, 31, 28, 2, "#fff0a8"); rect(184, 42, 34, 2, "#e58a43"); rect(180, 50, 42, 2, "#c76536");
    rect(190, 59, 22, 2, "#b75d2e");
    for (let i = 0; i < 7; i++) {
      const x = 18 + i * 34 + ((game.tick * (0.06 + i * 0.02)) % 22);
      const y = 30 + (i % 3) * 12;
      rect(x, y, 18, 3, i % 2 ? "#f2b86a" : "#d97842");
      rect(x + 6, y + 4, 24, 2, "#bb5c3f");
      rect(x + 3, y - 2, 12, 1, "#ffd089");
      rect(x + 12, y + 7, 10, 1, "#7d3b38");
    }
    // 夕空をわたる鳥の群れ
    const bfx = ((game.tick * 0.5) % (VW + 80)) - 40;
    for (let i = 0; i < 3; i++) {
      const wing = ((game.tick >> 3) + i) % 2;
      rect(bfx + i * 14, 52 + i * 5 + wing, 2, 1, "#4a1f28");

      rect(bfx + i * 14 + 4, 52 + i * 5 + wing, 2, 1, "#4a1f28");

    // 霞の横線
    for (let y = 86; y < 138; y += 9) rect((y * 5) % 32, y, 180, 1, "rgba(255,213,139,0.20)");
    for (let y = 92; y < 138; y += 14) rect(96 + (y % 22), y + 3, 104, 1, "rgba(80,31,54,0.22)");

  // ----------------------------------------------------------------- 売り場生成
  function priceVariant(base, mul) {
    // 88円/98円のようなスーパーらしい端数にする
    const p = Math.round(base * mul / 10) * 10 - 2;
    return Math.max(58, p);
  }

  function genSlots(course) {
    const slots = [];
    for (let r = 0; r < MH; r++) {
      for (let c = 0; c < MW; c++) {
        const t = MAP[r][c];
        if (CATNAME[t] && t !== "K") slots.push({ tx:c, ty:r, cat:t, item:null, price:0, sticker:0, flyer:false });
        if (t === "K") slots.push({ tx:c, ty:r, cat:"K", item:null, price:0, sticker:50, flyer:false });
      }
    }
    const byCat = {};
    slots.forEach(function (s) { (byCat[s.cat] = byCat[s.cat] || []).push(s); });
    const empty = function (cat) { return (byCat[cat] || []).filter(function (s) { return !s.item; }); };
    const pick = function (arr) { return arr[(Math.random() * arr.length) | 0]; };

    // 1) リストの品を各1か所(安め〜定価)
    course.list.forEach(function (key) {
      const cands = empty(ITEMS[key].cat);
      if (!cands.length) return;
      const s = pick(cands);
      s.item = key; s.price = priceVariant(ITEMS[key].base, 0.9 + Math.random() * 0.2);
    });
    // 2) 余裕があれば2か所目(価格ちがい。比べて安い方を買うのがコツ)
    course.list.slice().sort(function () { return Math.random() - 0.5; }).forEach(function (key) {
      const cands = empty(ITEMS[key].cat);
      if (!cands.length) return;
      const s = pick(cands);
      s.item = key; s.price = priceVariant(ITEMS[key].base, 0.82 + Math.random() * 0.36);
    });
    // 3) おつとめ品コーナー: 全商品からランダム(半額シール付き)
    const allKeys = Object.keys(ITEMS);
    (byCat.K || []).forEach(function (s) {
      const key = pick(allKeys);
      s.item = key; s.price = priceVariant(ITEMS[key].base, 1.0); s.sticker = 50;
    });
    // 4) 残りの棚をカテゴリ内の商品で埋める
    slots.forEach(function (s) {
      if (s.item || s.cat === "K") return;
      const pool = allKeys.filter(function (k) { return ITEMS[k].cat === s.cat; });
      const key = pick(pool);
      s.item = key; s.price = priceVariant(ITEMS[key].base, 0.9 + Math.random() * 0.25);
    });
    // 5) 値引きシール(ランダム)
    slots.forEach(function (s) {
      if (s.cat === "K" || !s.item) return;
      if (Math.random() < 0.2) s.sticker = [10, 20, 30][(Math.random() * 3) | 0];
    });
    // 6) 本日のチラシ特売: リストの品2つを40%引きに
    const flyer = [];
    const listSlots = slots.filter(function (s) { return s.item && course.list.indexOf(s.item) >= 0 && s.cat !== "K"; });
    listSlots.sort(function () { return Math.random() - 0.5; });
    for (let i = 0; i < Math.min(2, listSlots.length); i++) {
      const s = listSlots[i];
      s.sticker = 40; s.flyer = true;
      flyer.push(s);
    }
    run.slots = slots;
    run.flyer = flyer;
  }

  // ----------------------------------------------------------------- 会計・採点
  function doCheckout(timeup) {
    const course = run.course;
    const done = course.list.filter(function (k) { return run.listDone[k]; }).length;
    const comp = done / course.list.length;
    let savings = 0, waste = 0, total = 0;
    run.purchases.forEach(function (p) {
      total += p.paid;
      savings += Math.max(0, p.base - p.paid);
      if (!p.needed) waste += p.paid;
    });
    const timeNorm = timeup ? 0 : Math.max(0, run.timeLeft / course.time);
    const savNorm = Math.min(1, savings / (course.budget * 0.14));
    let score = comp * 60 + savNorm * 22 + timeNorm * 18 - Math.min(18, waste / course.budget * 60);
    score = Math.round(score);
    let grade;
    if (comp >= 1) grade = score >= 86 ? "S" : score >= 66 ? "A" : "B";
    else grade = score >= 45 ? "B" : "C";
    const comments = {
      S: "かんぺき! きょうの夕はんは ごうかだ!",
      A: "なかなかの うでまえ! その調子!",
      B: "ぶじに 買えたけど まだ のびしろあり。",
      C: "買い忘れが…。 チラシと リストを チェック!"
    };
    run.result = {
      grade: grade, score: score, comment: comments[grade],
      done: done, listTotal: course.list.length,
      total: total, savings: savings, waste: waste,
      cashLeft: run.cash, timeLeft: Math.max(0, Math.ceil(run.timeLeft)),
      timeup: !!timeup
    };
    if (comp >= 1) {
      if (run.courseIdx + 1 >= game.unlocked) game.unlocked = Math.min(COURSES.length, run.courseIdx + 2);
      const prev = game.grades[run.courseIdx];
      if (!prev || (GRADE_ORDER[grade] || 0) > (GRADE_ORDER[prev] || 0)) game.grades[run.courseIdx] = grade;
      saveProgress();
    }
    game.popup = null;
    game.mode = "result";
    sfx(grade === "S" || grade === "A" ? "fanfare" : "page");
  }

  // ----------------------------------------------------------------- 経路探索(タップ移動)
  function bfsPath(sx, sy, gx, gy) {
    if (sx === gx && sy === gy) return [];
    const prev = {};
    const q = [[sx, sy]];
    prev[sx + "," + sy] = null;
    const dirs = [["up",0,-1],["down",0,1],["left",-1,0],["right",1,0]];
    while (q.length) {
      const cur = q.shift();
      if (cur[0] === gx && cur[1] === gy) break;
      for (let i = 0; i < 4; i++) {
        const nx = cur[0] + dirs[i][1], ny = cur[1] + dirs[i][2];
        const k = nx + "," + ny;
        if (walkable(nx, ny) && !(k in prev)) { prev[k] = { at: cur, dir: dirs[i][0] }; q.push([nx, ny]); }
      }
    }
    if (!((gx + "," + gy) in prev)) return null;
    const path = [];
    let k = gx + "," + gy;
    while (prev[k]) { path.unshift(prev[k].dir); k = prev[k].at[0] + "," + prev[k].at[1]; }
    return path;
  }
  // 目標タイルに隣接する床のうち、最短で行けるものへの経路
  function pathToAdjacent(tx, ty) {
    let best = null;
    const around = [[0,-1],[0,1],[-1,0],[1,0]];
    for (let i = 0; i < 4; i++) {
      const ax = tx + around[i][0], ay = ty + around[i][1];
      if (!walkable(ax, ay)) continue;
      const p = bfsPath(player.tx, player.ty, ax, ay);
      if (p && (!best || p.length < best.length)) best = p;
    }
    return best;
  }

  // =======================================================================
  //  更新
  // =======================================================================
  function stepEntity(ent) {
    if (!ent.moving) return;
    ent.moving.t++;
    if (ent.moving.t >= 8) {
      ent.tx = ent.moving.toX; ent.ty = ent.moving.toY;
      ent.moving = null;
    }
  }
  function tryMove(ent, dir) {
    ent.dir = dir;
    const d = { up:[0,-1], down:[0,1], left:[-1,0], right:[1,0] }[dir];
    const nx = ent.tx + d[0], ny = ent.ty + d[1];
    if (!walkable(nx, ny)) return false;
    ent.moving = { toX:nx, toY:ny, t:0 };
    return true;
  }
  function entPos(ent) {
    let x = ent.tx * TILE, y = FY + ent.ty * TILE;
    if (ent.moving) {
      const d = { up:[0,-1], down:[0,1], left:[-1,0], right:[1,0] }[ent.dir];
      const f = ent.moving.t / 8;
      x = (ent.tx + d[0] * f) * TILE;
      y = FY + (ent.ty + d[1] * f) * TILE;
    }
    return { x: x, y: y };
  }

  const held = {};

  function update() {
    game.tick++;
    game.now = performance.now();
    updateFx();
    updatePopups();

    // 時間
    run.timeLeft = run.course.time - (game.tick - run.startTick) / 60;
    if (run.timeLeft <= 0) { run.timeLeft = 0; doCheckout(true); return; }

    // タイムセール
    const elapsed = run.course.time - run.timeLeft;
    for (let i = 0; i < run.sales.length; i++) {
      const sch = run.sales[i];
      if (!sch.fired && elapsed >= sch.at) {
        sch.fired = true;
        const cats = ["P","M","D","G","F","B","S"];
        sch.cat = cats[(Math.random() * cats.length) | 0];
        run.sale = { cat: sch.cat, until: elapsed + 12 };
        showMsg("タイムセール! " + CATNAME[sch.cat] + "が 3わりびき!");
        sfx("sale");
      }
    }
    if (run.sale && elapsed > run.sale.until) { run.sale = null; showMsg("タイムセール しゅうりょう"); }

    // プレイヤー移動
    if (game.popup) { player.path = []; }
    else {
      stepEntity(player);
      if (!player.moving) {
        let dir = null;
        if (held.up) dir = "up"; else if (held.down) dir = "down";
        else if (held.left) dir = "left"; else if (held.right) dir = "right";
        else if (player.path.length) dir = player.path.shift();
        if (dir) { player.anim++; if (!tryMove(player, dir)) player.path = []; }
        // タップ目標に隣接したら自動で調べる
        if (!dir && player.pend && !player.path.length) {
          const t = player.pend; player.pend = null;
          const dx = t.tx - player.tx, dy = t.ty - player.ty;
          if (Math.abs(dx) + Math.abs(dy) === 1) {
            player.dir = dx === 1 ? "right" : dx === -1 ? "left" : dy === 1 ? "down" : "up";
            tryInteract(t.tx, t.ty);
          }
        }
      } else player.anim++;
    }

    // NPC(店内のお客さん)
    npcs.forEach(function (n) {
      stepEntity(n);
      if (!n.moving && --n.timer <= 0) {
        n.timer = 50 + (Math.random() * 70 | 0);
        const dirs = ["up","down","left","right"];
        tryMove(n, dirs[(Math.random() * 4) | 0]);
      }
      if (n.moving) n.anim = (n.anim || 0) + 1;
    });
  }

    rect(x, y, TILE, TILE, "#d8cdb2");
    rect(x, y, TILE, 4, "#c4b898");
    rect(x, y + TILE - 2, TILE, 2, "#b5aa8a");

      rect(x + 3, y + 5, 10, 9, tx % 8 === 1 ? "#f8c8d8" : "#c8e4f8");

  function drawShelfTile(s, x, y) {
    const col = CATCOL[s.cat];
    const isCold = s.cat === "D" || s.cat === "F";
    // 棚本体
    rect(x, y, TILE, TILE, isCold ? "#dceef8" : "#e7dbc0");
    rect(x, y, TILE, 2, col);
    rect(x, y + 2, TILE, 1, "rgba(0,0,0,0.15)");
    rect(x, y + TILE - 2, TILE, 2, isCold ? "#a8cde0" : "#c9b992");
    if (isCold) { rect(x + 1, y + 4, 2, 9, "rgba(255,255,255,0.65)"); }
    if (s.cat === "K") {   // おつとめ品ワゴン
      rect(x, y + 3, TILE, 11, "#f2c94c");
      rect(x + 1, y + 4, TILE - 2, 9, "#f7e0a0");
      rect(x + 2, y + 14, 3, 2, "#8a7f66"); rect(x + 11, y + 14, 3, 2, "#8a7f66");
    }
    if (!s.item) {
      // 売り切れ
      rect(x + 5, y + 6, 6, 1, "#b8ad96"); rect(x + 7, y + 4, 1, 5, "#b8ad96");
      return;
    }
    drawArt(ICONS[s.item], x + 4, y + 2, IC, 1);
    // 値札
    const price = slotPrice(s);
    const off = s.sticker > 0 || (run.sale && run.sale.cat === s.cat);
    const flash = run.sale && run.sale.cat === s.cat && (game.tick >> 3) % 2 === 0;
    rect(x + 1, y + 10, 14, 6, flash ? "#ffe08a" : "#ffffff");
    rect(x + 1, y + 10, 14, 1, "#c9bfa6");
    btext(String(price), x + 2, y + 10 + 1 - 0, off ? "#c81e1e" : "#3a2e22", 1);
    // 値引きバッジ
    if (s.sticker > 0) {
      badge(x + 9, y - 3, 8, 7, s.sticker >= 40 ? "#e94f4f" : "#f59e0b");
      btext(String(s.sticker / 10), x + 11, y - 2, "#ffffff", 1);
    }
    if (game.mode === "title") return;

    // ゲージのなめらか減少
    if (battle.shown < battle.book) battle.shown = Math.min(battle.book, battle.shown + 1.8);
    else if (battle.shown > battle.book) battle.shown = battle.book;
    if (battle.shownRemaining > battle.remaining) battle.shownRemaining = Math.max(battle.remaining, battle.shownRemaining - 1.8);
    else if (battle.shownRemaining < battle.remaining) battle.shownRemaining = battle.remaining;

    // 各種演出タイマー
    if (battle.screenShake > 0) battle.screenShake--;
    if (battle.dealFlash > 0) battle.dealFlash--;
    if (battle.ticketT > 0) {
      battle.ticketT--;
      if (battle.ticketT === 30) { spawnFx(162, 100, 12, ["#7dffb0","#fff7d8","#facc15"], 1.4); sfxAbsorb(); }
    }

    // タイプライター送り
    if (["intro","result","win","lose"].includes(battle.phase)) {
      if (battle.typed < pageLen() && game.tick % 2 === 0) battle.typed++;
    }
  }

    // ディール成立アニメ(電話 → 端末入力 → チケットがブックへ)
    if (battle.phase === "dealAnim") {
      battle.animT++;
      const t = battle.animT;
      if (t === 10 && !battle.animHit) {
        battle.animHit = true;
        const amount = battle.pending.amount;
        battle.book = Math.min(SIZE, battle.book + amount);
        battle.remaining = Math.max(0, SIZE - battle.book);
        if (amount > 0) {
          const investors = ["MEIJI AM", "KANTO BK", "SAKURA LIFE", "NORTH FUND", "CENTRAL AM", "TOTO PENSION", "YAMATO GAM"];
          battle.ticketName = investors[(battle.turn + amount) % investors.length];
          battle.ticketAmount = amount;
          battle.ticketT = ORDER_TICKET_DURATION;
          battle.ticketCrit = !!battle.pending.critical;
          addPopup("+" + amount + "億", 108, 42, battle.ticketCrit ? "#ffd36a" : "#7dffb0");
          sfxCoin();
          if (battle.ticketCrit) {
            battle.dealFlash = 6; battle.screenShake = 6;
            spawnFx(90, 56, 24, ["#ffd24a","#fff0a8","#ff9a5c"], 2.2);
            sfxCrit();
          } else if (amount >= 15) { battle.dealFlash = 4; battle.screenShake = 4; }
        }
      }
    }
    // 売り場看板
    BLOCKS.forEach(function (b) {
      const x = b.tx * TILE, y = FY + b.ty * TILE - 6;
      const w = b.len * TILE;
      const saleHere = run.sale && run.sale.cat === b.cat && (game.tick >> 3) % 2 === 0;
      rect(x + 2, y, w - 4, 7, saleHere ? "#ffdf6b" : CATCOL[b.cat]);
      rect(x + 2, y, w - 4, 1, "rgba(255,255,255,0.5)");
      const label = CATNAME[b.cat];
      text(label, x + Math.max(2, (w - label.length * 7) / 2), y, saleHere ? "#8a4f14" : "#ffffff", 7);
    });
  }

    hrect(rx + 8, ry + 10, rw, rh, "rgba(30,18,8,0.35)");
    hrect(rx, ry, rw, rh, "#fdfdf6");
    for (let i = 0; i < rw; i += 12) { hrect(rx + i, ry - 3, 7, 5, "#fdfdf6"); hrect(rx + i, ry + rh - 2, 7, 5, "#fdfdf6"); }
    htext("スーパーおかいもの", rx + 72, ry + 22, "#3a2e22", 24);
    htext("★ " + run.course.name + " ★", rx + 90, ry + 54, "#8a7a5e", 18, "");
    hrect(rx + 24, ry + 82, rw - 48, 2, "#c9bfa6");

    // 購入品(最大10行)
    const shown = run.purchases.slice(0, 10);
    for (let i = 0; i < shown.length; i++) {
      const p = shown[i];
      const y = ry + 96 + i * 26;
      htext(p.name + (p.needed ? "" : " ※"), rx + 30, y, p.needed ? "#3a2e22" : "#b06a3a", 17, "");
      const ps = "¥" + p.paid;
      htext(ps, rx + rw - 30 - ps.length * 10, y, p.paid < p.base ? "#c81e1e" : "#3a2e22", 17, "");
    }
    if (run.purchases.length > 10) htext("… ほか " + (run.purchases.length - 10) + "点", rx + 30, ry + 96 + 10 * 26, "#8a7a5e", 15, "");
    const lineY = ry + 96 + Math.min(11, run.purchases.length + (run.purchases.length > 10 ? 1 : 0)) * 26 + 4;
    hrect(rx + 24, lineY, rw - 48, 2, "#c9bfa6");

    // 集計
    let y2 = lineY + 12;
    const row = function (label, val, col) {
      htext(label, rx + 30, y2, "#5b4a34", 18, "");
      htext(val, rx + rw - 30 - String(val).length * 11, y2, col || "#3a2e22", 18);
      y2 += 28;
    };
    row("ごうけい", "¥" + r.total);
    row("のこったお金", "¥" + r.cashLeft, r.cashLeft > 0 ? "#157a3e" : "#c81e1e");
    row("せつやくした額", "¥" + r.savings, "#c81e1e");
    if (r.waste > 0) row("リストがい※", "¥" + r.waste, "#b06a3a");
    row("リスト", r.done + " / " + r.listTotal + " 品", r.done === r.listTotal ? "#157a3e" : "#c81e1e");
    row(r.timeup ? "じかんぎれ!" : "のこり時間", r.timeup ? "--" : r.timeLeft + "びょう");

    hrect(rx + 24, y2 + 2, rw - 48, 2, "#c9bfa6");
    htext(r.comment, rx + 34, y2 + 14, "#5b4a34", 15, "");

    // 評価スタンプ
    const stampCol = r.grade === "S" ? "#e0a010" : r.grade === "A" ? "#e94f4f" : r.grade === "B" ? "#4aa3e0" : "#9a917f";
    const sx = rx + rw - 96, sy = ry + 14;
    ctx.save();
    ctx.translate(sx + 34, sy + 34);
    ctx.rotate(-0.22);
    ctx.strokeStyle = stampCol; ctx.lineWidth = 5;
    ctx.beginPath(); ctx.arc(0, 0, 32, 0, Math.PI * 2); ctx.stroke();
    ctx.font = "bold 40px 'MS Gothic',monospace"; ctx.fillStyle = stampCol;
    ctx.textBaseline = "middle"; ctx.textAlign = "center";
    ctx.fillText(r.grade, 0, 2);
    ctx.restore();
    ctx.textAlign = "left";

    // 紙吹雪(S/A)
    if (r.grade === "S" || r.grade === "A") {
      const cols = ["#fde047", "#e94f4f", "#4ade80", "#7dd3fc", "#f8a8cd"];
      for (let i = 0; i < 70; i++) {
        const x = (i * 123 + game.tick * 3) % HIW;
        const y = (i * 89 + game.tick * (2 + i % 3)) % HIH;
        hrect(x, y, 7, 10, cols[i % cols.length]);
      }
    }
    if ((game.tick >> 4) % 2 === 0) htext(IS_TOUCH ? "タップで コースせんたくへ" : "ENTER で コースせんたくへ", 234, 640, "#ffe9b0", 22);
  }

  // =======================================================================
  //  メイン描画
  // =======================================================================
  function draw() {
    if (game.mode === "result") {
      useHighPixels();
      drawResult();
      return;
    }
    useBasePixels();
    if (game.mode === "title") drawTitle();
    else if (game.mode === "select") drawSelect();
    else if (game.mode === "flyer") drawFlyer();
    else drawShop();
  }

  function loop() { update(); draw(); requestAnimationFrame(loop); }

  // =======================================================================
  //  入力
  // =======================================================================
  const KEYMAP = {
    ArrowUp:"up", w:"up", W:"up",
    ArrowDown:"down", s:"down", S:"down",
    ArrowLeft:"left", a:"left", A:"left",
    ArrowRight:"right", d:"right", D:"right"
  };
  const OK_KEYS = ["Enter", " ", "z", "Z"];

  function confirmAction() {
    if (game.mode === "title") { sfx("confirm"); game.mode = "select"; return; }
    if (game.mode === "select") {
      if (game.selCursor < game.unlocked) { sfx("confirm"); startCourse(game.selCursor); }
      else sfx("cancel");
      return;
    }
    if (game.mode === "flyer") { sfx("confirm"); enterShop(); return; }
    if (game.mode === "result") { sfx("page"); game.mode = "select"; return; }
    if (game.mode === "shop") {
      if (game.popup) { popupConfirm(); return; }
      const f = facingTile();
      tryInteract(f.tx, f.ty);
    }
  }

  window.addEventListener("keydown", function (e) {
    startAudio();
    if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key)) e.preventDefault();
    const k = e.key;
    if (game.mode === "select") {
      if (KEYMAP[k] === "up") { game.selCursor = (game.selCursor + COURSES.length - 1) % COURSES.length; sfx("cursor"); }
      else if (KEYMAP[k] === "down") { game.selCursor = (game.selCursor + 1) % COURSES.length; sfx("cursor"); }
      else if (OK_KEYS.includes(k)) confirmAction();
      return;
    }
    if (game.mode === "shop") {
      if (game.popup) {
        if (KEYMAP[k] === "left" || KEYMAP[k] === "right") { game.popup.sel = 1 - game.popup.sel; sfx("cursor"); }
        else if (OK_KEYS.includes(k)) confirmAction();
        else if (k === "Escape" || k === "x" || k === "X") { game.popup = null; sfx("cancel"); }
        return;
      }
      if (KEYMAP[k]) { held[KEYMAP[k]] = true; player.path = []; player.pend = null; return; }
      if (OK_KEYS.includes(k)) { confirmAction(); return; }
      return;
    }
    if (OK_KEYS.includes(k) || k === "Escape") confirmAction();
  });
  window.addEventListener("keyup", function (e) {
    if (KEYMAP[e.key]) delete held[KEYMAP[e.key]];
  });

  function canvasPos(e) {
    const r = canvas.getBoundingClientRect();
    return { x: (e.clientX - r.left) / r.width * VW, y: (e.clientY - r.top) / r.height * VH };
  }
  function commandHitIndex(p) {
    for (let i = 0; i < COMMANDS.length; i++) {
      const cx = 8 + (i % 2) * 120;
      const cy = 199 + ((i / 2) | 0) * 11;
      if (p.x >= cx && p.x <= cx + 116 && p.y >= cy && p.y <= cy + 16) return i;
    }
    return -1;
  }
  window.addEventListener("pointerdown", function (e) {
    e.preventDefault();
    startAudio();
    const p = canvasPos(e);
    if (game.mode === "title") { confirmAction(); return; }
    if (game.mode === "flyer" || game.mode === "result") { confirmAction(); return; }
    if (game.mode === "select") {
      for (let i = 0; i < COURSES.length; i++) {
        const y = 36 + i * 56;
        if (p.x >= 12 && p.x <= 244 && p.y >= y && p.y <= y + 50) {
          game.selCursor = i;
          if (i < game.unlocked) { sfx("confirm"); startCourse(i); }
          else sfx("cancel");
          return;
        }
      }
      return;
    }
    if (game.mode === "shop") {
      if (game.popup) {
        // ボタン判定
        if (game.popup.type === "slot") {
          if (p.x >= 68 && p.x <= 140 && p.y >= 182 && p.y <= 198) { game.popup.sel = 0; popupConfirm(); return; }
          if (p.x >= 150 && p.x <= 202 && p.y >= 182 && p.y <= 198) { game.popup.sel = 1; popupConfirm(); return; }
        } else {
          if (p.x >= 52 && p.x <= 116 && p.y >= 186 && p.y <= 202) { game.popup.sel = 0; popupConfirm(); return; }
          if (p.x >= 136 && p.x <= 200 && p.y >= 186 && p.y <= 202) { game.popup.sel = 1; popupConfirm(); return; }
        }
        game.popup = null; sfx("cancel");
        return;
      }
      const tx = (p.x / TILE) | 0, ty = ((p.y - FY) / TILE) | 0;
      if (ty < 0 || ty >= MH) return;
      const t = tileAt(tx, ty);
      if (t === "R" || CATNAME[t]) {
        // 隣接していれば即しらべる。遠ければ歩いてから。
        const dx = tx - player.tx, dy = ty - player.ty;
        if (Math.abs(dx) + Math.abs(dy) === 1 && !player.moving) {
          player.dir = dx === 1 ? "right" : dx === -1 ? "left" : dy === 1 ? "down" : "up";
          tryInteract(tx, ty);
          return;
        }
        const path = pathToAdjacent(tx, ty);
        if (path) { player.path = path; player.pend = { tx: tx, ty: ty }; sfx("cursor"); }
        return;
      }
      if (walkable(tx, ty)) {
        const path = bfsPath(player.tx, player.ty, tx, ty);
        if (path) { player.path = path; player.pend = null; }
      }
    }
  }, { passive:false });
  window.addEventListener("touchmove", function (e) { e.preventDefault(); }, { passive:false });
  window.addEventListener("gesturestart", function (e) { e.preventDefault(); }, { passive:false });
  window.addEventListener("contextmenu", function (e) { e.preventDefault(); });

  // =======================================================================
  //  サウンド(Web Audio API / ほのぼのチップチューン)
  // =======================================================================
  const audio = { ctx:null, timer:null, step:0, track:"", master:null, noise:null };
  const TRACKS = {
    title: {
      step:135, vol:0.024,
      mel:["C5",null,"E5",null,"G5",null,"E5",null,"A5",null,"G5",null,"E5",null,"C5",null,
           "D5",null,"F5",null,"A5",null,"F5",null,"G5",null,"E5",null,"C5",null,null,null],
      bas:["C3",null,"G2",null,"C3",null,"G2",null,"F2",null,"C3",null,"F2",null,"C3",null,
           "G2",null,"D3",null,"G2",null,"D3",null,"C3",null,"G2",null,"C3",null,null,null],
      arp:["C4","E4","G4","E4","C4","E4","G4","E4","F3","A3","C4","A3","G3","B3","D4","B3"],
      drum:true
    },
    select: {
      step:140, vol:0.02,
      mel:["E5",null,"G5",null,"C6",null,"G5",null,"A5",null,"F5",null,"D5",null,null,null,
           "D5",null,"F5",null,"B5",null,"F5",null,"G5",null,"E5",null,"C5",null,null,null],
      bas:["C3",null,null,null,"A2",null,null,null,"F2",null,null,null,"G2",null,null,null,
           "C3",null,null,null,"A2",null,null,null,"F2",null,null,null,"C3",null,null,null],
      arp:["C4","E4","G4","E4","A3","C4","E4","C4","F3","A3","C4","A3","G3","B3","D4","B3"],
      drum:false
    },
    shop: {
      step:122, vol:0.023,
      mel:["E5",null,"E5",null,"G5",null,"C5",null,"D5",null,"E5","F5","E5",null,"D5",null,
           "C5",null,"E5",null,"G5","A5","G5",null,"E5",null,"D5",null,"C5",null,null,null],
      bas:["C3",null,"C3",null,"G2",null,"G2",null,"A2",null,"A2",null,"F2",null,"G2",null,
           "C3",null,"C3",null,"E3",null,"E3",null,"F3",null,"F3",null,"G2",null,"G2",null],
      arp:["C4",null,"E4",null,"G4",null,"E4",null,"A3",null,"C4",null,"F3",null,"A3",null],
      drum:true
    },
    sale: {
      step:96, vol:0.026,
      mel:["G5","G5",null,"E5","G5",null,"A5","G5","E5",null,"C5","D5","E5",null,"G5",null,
           "A5","A5",null,"F5","A5",null,"C6","A5","G5",null,"E5","F5","G5",null,"C6",null],
      bas:["C3","C3","G2","C3","F2","F2","C3","F2","G2","G2","D3","G2","C3","C3","G2","C3",
           "F2","F2","C3","F2","G2","G2","D3","G2","C3","C3","E3","G2","C3","C3","C3","C3"],
      arp:["C4","E4","G4","C5","F3","A3","C4","F4","G3","B3","D4","G4","C4","E4","G4","C5"],
      drum:true
    },
    result: {
      step:112, vol:0.026,
      mel:["C5","E5","G5","C6","B5","G5","E5","C5","D5","F5","A5","D6","C6","A5","G5",null,
           "E5","G5","C6","E6","D6","C6","A5","G5","C6",null,"G5",null,"E5",null,"C5",null],
      bas:["C3",null,"C3",null,"G2",null,"G2",null,"A2",null,"A2",null,"F2",null,"G2",null,
           "C3",null,"C3",null,"E3",null,"E3",null,"F3",null,"G3",null,"C3",null,"C3",null],
      arp:["C4","E4","G4","C5","G3","B3","D4","G4","A3","C4","E4","A4","F3","A3","C4","F4"],
      drum:true
    }
  };
  function freq(n) {
    if (!n) return 0;
    const m = {C:-9,D:-7,E:-5,F:-4,G:-2,A:0,B:2};
    const mm = n.match(/^([A-G])(#?)(\d)$/); if (!mm) return 0;
    return 440 * Math.pow(2, (m[mm[1]] + (mm[2]?1:0) + (Number(mm[3])-4)*12) / 12);
  }
  function blip(note, time, len, vol, type) {
    if (!note) return;
    const o = audio.ctx.createOscillator(), g = audio.ctx.createGain();
    o.type = type || "square"; o.frequency.value = freq(note);
    g.gain.setValueAtTime(0.0001, time);
    g.gain.linearRampToValueAtTime(vol, time + 0.01);
    g.gain.setValueAtTime(vol, time + len*0.7);
    g.gain.linearRampToValueAtTime(0.0001, time + len);
    o.connect(g).connect(audio.master || audio.ctx.destination);
    o.start(time); o.stop(time + len);
  }
  // 短い効果音(約定・クリティカル・ブック吸収)
  function sfxPlay(notes, step, vol, type) {
    if (!audio.ctx) return;
    const t0 = audio.ctx.currentTime + 0.02;
    for (let i = 0; i < notes.length; i++) blip(notes[i], t0 + i * step, step * 1.5, vol, type);
  }
  function sfxCoin()   { sfxPlay(["B5","E6"], 0.07, 0.05, "square"); }
  function sfxCrit()   { sfxPlay(["C5","E5","G5","C6"], 0.06, 0.05, "square"); }
  function sfxAbsorb() { sfxPlay(["E6","B5","G5"], 0.05, 0.03, "triangle"); }

  function noteAt(seq, i) { return seq[i % seq.length]; }
  function curTrackName() {
    if (game.mode === "shop") return run.sale ? "sale" : "shop";
    if (game.mode === "select" || game.mode === "flyer") return "select";
    if (game.mode === "result") return "result";
    return "title";
  }
  function makeNoise() {
    const len = audio.ctx.sampleRate / 2;
    const buf = audio.ctx.createBuffer(1, len, audio.ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    return buf;
  }
  function noiseHit(time, len, vol) {
    const src = audio.ctx.createBufferSource(), g = audio.ctx.createGain(), f = audio.ctx.createBiquadFilter();
    src.buffer = audio.noise;
    f.type = "highpass"; f.frequency.value = 2200;
    g.gain.setValueAtTime(vol, time);
    g.gain.exponentialRampToValueAtTime(0.0001, time + len);
    src.connect(f).connect(g).connect(audio.master);
    src.start(time); src.stop(time + len);
  }
  function kick(time, vol) {
    const o = audio.ctx.createOscillator(), g = audio.ctx.createGain();
    o.type = "triangle";
    o.frequency.setValueAtTime(100, time);
    o.frequency.exponentialRampToValueAtTime(42, time + 0.1);
    g.gain.setValueAtTime(vol, time);
    g.gain.exponentialRampToValueAtTime(0.0001, time + 0.12);
    o.connect(g).connect(audio.master);
    o.start(time); o.stop(time + 0.12);
  }
  function scheduleMusic() {
    if (!audio.ctx) return;
    const name = curTrackName();
    if (audio.track !== name) { audio.track = name; audio.step = 0; }
    const tr = TRACKS[name], i = audio.step, t = audio.ctx.currentTime + 0.035;
    const stepLen = tr.step / 1000;
    blip(noteAt(tr.bas, i), t, stepLen * 1.5, tr.vol * 0.75, "triangle");
    blip(noteAt(tr.arp, i), t + stepLen * 0.12, stepLen * 0.5, tr.vol * 0.22, "square");
    blip(noteAt(tr.mel, i), t, stepLen * 1.0, tr.vol, "square");
    if (tr.drum) {
      if (i % 8 === 0) kick(t, tr.vol * 2.0);
      if (i % 8 === 4) noiseHit(t, 0.055, tr.vol * 0.8);
      if (i % 4 === 2) noiseHit(t, 0.016, tr.vol * 0.2);
    }
    audio.step++;
    audio.timer = setTimeout(scheduleMusic, tr.step);
  }
  // ---- 効果音 ----
  const SFX = {
    cursor:   [["E5", 0, 0.045, "square"]],
    confirm:  [["C5", 0, 0.06, "square"], ["G5", 0.05, 0.09, "square"]],
    cancel:   [["G4", 0, 0.07, "square"], ["D4", 0.06, 0.1, "square"]],
    page:     [["A4", 0, 0.05, "square"]],
    buy:      [["C6", 0, 0.04, "square"], ["E6", 0.045, 0.05, "square"], ["G6", 0.09, 0.1, "triangle"]],
    complete: [["C5", 0, 0.07, "square"], ["E5", 0.07, 0.07, "square"], ["G5", 0.14, 0.07, "square"], ["C6", 0.21, 0.2, "square"]],
    sale:     [["G5", 0, 0.09, "square"], ["G5", 0.11, 0.09, "square"], ["C6", 0.22, 0.2, "square"]],
    fanfare:  [["C5", 0, 0.09, "square"], ["F5", 0.09, 0.09, "square"], ["A5", 0.18, 0.09, "square"], ["C6", 0.27, 0.3, "square"]]
  };
  function sfx(name) {
    if (!audio.ctx) return;
    const seq = SFX[name]; if (!seq) return;
    const now = audio.ctx.currentTime + 0.01;
    for (let i = 0; i < seq.length; i++) blip(seq[i][0], now + seq[i][1], seq[i][2], 0.05, seq[i][3]);
  }
  function startAudio() {
    if (audio.ctx) return;
    const AC = window.AudioContext || window.webkitAudioContext; if (!AC) return;
    audio.ctx = new AC();
    audio.master = audio.ctx.createGain();
    audio.master.gain.value = 0.4;
    audio.master.connect(audio.ctx.destination);
    audio.noise = makeNoise();
    if (audio.ctx.state === "suspended") audio.ctx.resume();
    scheduleMusic();
  }

  // =======================================================================
  //  起動
  // =======================================================================
  game.mode = "title";
  requestAnimationFrame(loop);
  </script>
</body>
</html>
