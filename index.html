      touch-action: none;
      -webkit-user-select: none;

      -webkit-touch-callout: none;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: var(--app-height, 100svh);
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      box-sizing: border-box;
    }
    canvas {
      width: min(768px, 100vw, calc(var(--app-height, 100svh) * 256 / 224));
      height: auto;
      max-height: var(--app-height, 100svh);
      aspect-ratio: 256 / 224;
      background: #000;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
      touch-action: none;
    }
    @media (max-width: 430px) and (orientation: portrait) {
      body {
        align-items: flex-start;
        justify-content: center;
        padding-top: max(env(safe-area-inset-top), 6px);
      }
      canvas {
        width: 100vw;
        max-width: 100vw;
        margin-top: 0;
      }
    }
    @media (max-width: 430px) and (orientation: landscape) {
      canvas {
        width: auto;
        height: var(--app-height, 100svh);
        max-width: 100vw;
      }
    }
  </style>

    "U":["101","101","101","101","111"],"V":["101","101","101","101","010"],"W":["101","101","111","111","101"],"X":["101","101","010","101","101"],"Y":["101","101","010","010","010"],"Z":["111","001","010","100","111"],

  };
  function btext(str, x, y, color, scale) {
    scale = scale || 1;
    str = String(str).toUpperCase();
    for (let i = 0; i < str.length; i++) {
      const glyph = BF[str[i]] || BF[" "];
      for (let r = 0; r < glyph.length; r++) {
        for (let c = 0; c < 3; c++) if (glyph[r][c] === "1") rect(x + i * 4 * scale + c * scale, y + r * scale, scale, scale, color || C.frame);
      }
    }
  }

  // 文字配列 -> ドット絵。tint指定で不透明ピクセルを単色化(被ダメ点滅用)
  function drawArt(art, x, y, pal, scale, tint) {
    scale = scale || 1;
    for (let r = 0; r < art.length; r++) {
      const row = art[r]; if (!row) continue;
      for (let c = 0; c < row.length; c++) {
        const base = pal[row[c]];
        if (base) rect(x + c*scale, y + r*scale, scale, scale, tint || base);
      }
    }
  }

  function setPages(pages, next) { battle.pages = pages; battle.pi = 0; battle.typed = 0; battle.next = next || null; }
  function curPage() { return battle.pages[battle.pi] || ["", ""]; }
  function pageLen() { const p = curPage(); return (p[0]||"").length + (p[1]||"").length; }

  function applyStat(obj) {
    for (const k in obj) {
      const max = STAT_MAX[k] || 999;
      game.stats[k] = Math.max(0, Math.min(max, (game.stats[k]||0) + obj[k]));
    }
  }

  function startBattle() {
    battle.book = 0; battle.shown = 0;

    battle.cursor = 0; battle.phase = "intro";

  // -------------------------------------------------- コマンド(ブックビルディング)
  function resolveCommand(id) {
    applyStat({ stamina:-2 });          // 1ターンの基礎消耗(時間経過)
    let imm = 0;                        // このターンの追加オーダー(億)
    let pages = [];

    if (id === "widen") {
      applyStat({ stamina:-9, spread:5, nemawashi:4 });
      battle.rate = Math.min(16, battle.rate + 3);
      battle.trend = 1;
      pages = [["スプレッドを ワイドに 振った！", ""],
               ["気力 -9 ／ 必殺ゲージ +4", "需要トレンド ↑"]];
    } else if (id === "tighten") {
      applyStat({ stamina:11, spread:-5, nemawashi:2 });
      battle.rate = Math.max(0, battle.rate - 3);
      battle.trend = -1;
      pages = [["スプレッドを タイトに 寄せた", ""],
               ["気力 回復 ／ 必殺ゲージ +2", "需要トレンド ↓"]];
    } else if (id === "explain") {
      applyStat({ stamina:-3, trust:4, nemawashi:12 });
      battle.rate = Math.min(16, battle.rate + 1);
      battle.trend = 1; imm = 2;
      pages = [["ロードショーで 投資家を 口説いた", ""],
               ["発行体信頼と 必殺ゲージが あがった", ""]];
    } else if (id === "nemawashi") {
      if (game.stats.nemawashi < 35) {
        applyStat({ stamina:2 });
        battle.pending = { amount:0, noTurn:true,
          pages:[["必殺オーダーには", "必殺ゲージが たりない！"]] };
        return;
      }
      applyStat({ stamina:-22, nemawashi:-35 });
      battle.trend = 0; imm = 28;
      pages = [["必殺オーダーを たたき込んだ！", ""],
               ["大型オーダー！ 気力とゲージを消費", ""]];
    }

    // このターンに入る投資家オーダー(億)
    let orders = battle.rate + imm + ((Math.random()*3) | 0);
    orders = Math.min(battle.remaining, Math.max(0, orders));
    applyStat({ demand: orders });
    const after = battle.book + orders;
    const remainAfter = Math.max(0, SIZE - after);
    battle.pending = {
      amount: orders,
      pages: pages.concat([[
        "投資家オーダー +" + orders + "億円",
        "販売残高 " + remainAfter + "億円"
      ]])
    };
  }

  function chooseCommand() {
    resolveCommand(COMMANDS[battle.cursor].id);
    if (battle.pending && battle.pending.noTurn) {
      battle.phase = "result";
      setPages(battle.pending.pages, function () { toCommand(); });
      battle.pending = null;
      return;
    }
    battle.phase = "dealAnim";
    battle.animT = 0; battle.animHit = false;
  }

  function toWin() {
    battle.phase = "win";
    setPages([
      ["販売残高 0億円！", ""],
      ["100億円 完売 ―― 起債 成立！", ""]
    ], function () { startEnding("win"); });
  }
  function toLose(reason) {
    battle.phase = "lose";
    ending.reason = reason;
    const head = reason === "time" ? ["条件決定の機を のがした……", "(ターン切れ)"]
                                   : ["気力が つきはてた……", ""];
    setPages([
      head,
      ["案件は いったん 見送りに……", ""]
    ], function () { startEnding("lose"); });
  }

  function drawEffects() {
    if (battle.ticketT > 0) {
      const total = ORDER_TICKET_DURATION;
      const t = total - battle.ticketT;
      const fly = Math.min(1, t / 58);
      const ease = 1 - Math.pow(1 - fly, 3);
      const absorb = Math.max(0, Math.min(1, (t - 142) / 26));
      const w = 82, h = 30;
      const x = Math.round(-90 + 166 * ease + absorb * 18);
      const y = Math.round(48 + Math.sin(t / 7) * 2 - absorb * 4);
      rect(x + 3, y + 3, w, h, "rgba(0,0,0,0.35)");
      rect(x - 2, y - 2, w + 4, h + 4, "#3a2410");
      rect(x - 1, y - 1, w + 2, h + 2, "#caa15a");
      rect(x, y, w, h, "#fff7d8");
      rect(x, y, w, 4, "#facc15");
      rect(x, y + h - 4, w, 4, "#d9a441");
      rect(x + 5, y + 9, w - 10, 1, "#cdd4e0");
      rect(x + 5, y + 21, w - 10, 1, "#cdd4e0");
      btext("ORDER TICKET", x + 8, y + 6, "#7c2d12", 1);
      btext(battle.ticketName || "INVESTOR", x + 8, y + 14, "#1f2937", 1);
      text("+" + battle.ticketAmount + "億円", x + 8, y + 22, "#1e3a8a", 9);
      // 着地後しばらく読ませてから、ブック側へ吸収される光のラインを出す。
      if (t > 96) {
        const pulse = (game.tick >> 2) % 2;
        const lx = Math.min(170, x + w + Math.max(0, t - 96) * 2);
        rect(x + w, y + 15, lx - (x + w), 2, pulse ? "#7dffb0" : "#facc15");
        rect(153, 94, 23, 13, "#f4f5f7");
        rect(154, 95, 21, 11, "#cdd4e0");
        btext("BOOK", 157, 98, "#1e3a8a", 1);
      }
    }
    if (battle.dealFlash > 0) {
      ctx.fillStyle = "rgba(255,240,168,0.30)";
      ctx.fillRect(0, 0, VW, 128);
    }
    if (battle.phase === "win") {
      rect(50, 45, 156, 38, "rgba(2,6,23,0.88)");
      rect(52, 47, 152, 34, "#caa15a");
      rect(54, 49, 148, 30, "#0a0e22");
      btext("SOLD OUT", 75, 55, "#fff0a8", 2);
      btext("100 OKU COMPLETE", 72, 72, "#7dffb0", 1);
    }
  }

  function titleDither(x, y, w, h, c1, c2, step, phase) {
    // 低解像度に見せるためではなく、SFC風に大面積の色面を分割する粒状パターン。
    for (let yy = y; yy < y + h; yy += step) {
      for (let xx = x + ((yy + phase) % (step * 2) === 0 ? 0 : step); xx < x + w; xx += step * 2) {
        rect(xx, yy, 1, 1, ((xx + yy + phase) % 3) ? c1 : c2);
      }
    }
  }

  // スクロールするビル群(パララックス)
  function skyline(baseY, h0, h1, col, winCol, off, bw, gap) {
    const period = bw + gap;
    let start = -((off % period + period) % period);
    for (let x = start; x < VW; x += period) {
      const idx = Math.floor((x + off) / period);
      const h = h0 + (Math.abs(idx * 53) % (h1 - h0));
      rect(x, baseY - h, bw, h, col);
      for (let wy = baseY - h + 3; wy < baseY - 3; wy += 6) {
        for (let wx = x + 2; wx < x + bw - 2; wx += 5) {
          const lit = ((idx * 7 + wy + wx + (game.tick >> 4)) % 5) < 2;
          rect(wx, wy, 2, 3, lit ? winCol : "#0c1230");
        }
      }
    }
  }

  // ------- 高解像度シネマ部品(768x672) -------
  function hrect(x, y, w, h, color) { ctx.fillStyle = color; ctx.fillRect(x|0, y|0, w|0, h|0); }
  function htext(str, x, y, color, size, weight) {
    ctx.fillStyle = color || C.frame;
    ctx.font = (weight || "bold") + " " + (size || 24) + "px 'MS Gothic','Yu Gothic','Courier New',monospace";
    ctx.textBaseline = "top";
    ctx.fillText(str, x, y);
  }
  function hbtext(str, x, y, color, scale) {
    scale = scale || 3;
    str = String(str).toUpperCase();
    for (let i = 0; i < str.length; i++) {
      const glyph = BF[str[i]] || BF[" "];
      for (let r = 0; r < glyph.length; r++) {
        for (let c = 0; c < 3; c++) if (glyph[r][c] === "1") hrect(x + i * 4 * scale + c * scale, y + r * scale, scale, scale, color || C.frame);
      }
    }
  }
  function hdrawArt(art, x, y, pal, scale, tint) {
    scale = scale || HI_SCALE;
    for (let r = 0; r < art.length; r++) {
      const row = art[r]; if (!row) continue;
      for (let c = 0; c < row.length; c++) {
        const base = pal[row[c]];
        if (base) hrect(x + c * scale, y + r * scale, scale, scale, tint || base);
      }
    }
  }
  function hdither(x, y, w, h, c1, c2, step, phase) {
    for (let yy = y; yy < y + h; yy += step) {
      for (let xx = x + (((yy + phase) / step | 0) % 2 ? step : 0); xx < x + w; xx += step * 2) {
        hrect(xx, yy, step, step, ((xx + yy + phase) % 5) ? c1 : c2);
      }
    }
  }
  function hwindow(x, y, w, h) {
    hrect(x, y, w, h, "#020617");
    hrect(x + 3, y + 3, w - 6, h - 6, "#caa15a");
    hrect(x + 6, y + 6, w - 12, h - 12, "#0a0e22");
    hrect(x + 11, y + 11, w - 22, h - 22, "#10162e");
    for (let yy = y + 18; yy < y + h - 16; yy += 15) {
      for (let xx = x + 18 + ((yy / 15) | 0) % 2 * 4; xx < x + w - 16; xx += 21) hrect(xx, yy, 3, 3, "#1d2a52");
    }
  }
  function hcaption(l0, l1) {
    hwindow(18, 566, 732, 84);
    htext(l0, 42, 586, "#f8f8f8", 27);
    if (l1) htext(l1, 42, 620, "#aab4d4", 22);

  function hfade(e, dur) {
    const fin = Math.min(1, e / 0.45);
    const fout = Math.min(1, Math.max(0, (dur - e) / 0.45));
    const a = 1 - Math.min(fin, fout);

  }
  function htwinkle(maxY, n, seed) {
    for (let i = 0; i < n; i++) {
      const sx = (i * 159 + seed * 17) % HIW;
      const sy = (i * 113 + seed * 11) % maxY;

  function hSkyline(baseY, h0, h1, col, winCol, off, bw, gap) {
    const period = bw + gap;
    let start = -((off % period + period) % period);
    for (let x = start; x < HIW; x += period) {
      const idx = Math.floor((x + off) / period);
      const h = h0 + (Math.abs(idx * 53) % Math.max(1, h1 - h0));
      hrect(x, baseY - h, bw, h, col);
      hrect(x + bw - 6, baseY - h + 7, 6, h - 7, "#060a18");
      for (let wy = baseY - h + 12; wy < baseY - 9; wy += 18) {
        for (let wx = x + 8; wx < x + bw - 8; wx += 16) {
          const lit = ((idx * 7 + wy + wx + (game.tick >> 5)) % 5) < 2;
          hrect(wx, wy, 7, 9, lit ? winCol : "#0c1230");
          if (lit) hrect(wx, wy, 7, 2, "#fff0a8");
        }
      }
    }
  }

  // =======================================================================
  //  更新
  // =======================================================================
  function update() {
    game.tick++;
    game.now = performance.now();

    if (game.mode === "opening") {
      if (game.now - op.start >= OP_DUR) finishOpening();
      return;
    }
    if (game.mode === "ending") {
      // 自動では進めない。最後の画面で停止し、ENTER/クリックでタイトルへ。
      return;
    }
    if (game.mode === "title") return;

    // ゲージのなめらか減少
    if (battle.shown < battle.book) battle.shown = Math.min(battle.book, battle.shown + 1.8);
    else if (battle.shown > battle.book) battle.shown = battle.book;
    if (battle.shownRemaining > battle.remaining) battle.shownRemaining = Math.max(battle.remaining, battle.shownRemaining - 1.8);
    else if (battle.shownRemaining < battle.remaining) battle.shownRemaining = battle.remaining;

    // 各種演出タイマー
    if (battle.screenShake > 0) battle.screenShake--;
    if (battle.dealFlash > 0) battle.dealFlash--;
    if (battle.ticketT > 0) battle.ticketT--;

    // タイプライター送り
    if (["intro","result","win","lose"].includes(battle.phase)) {
      if (battle.typed < pageLen() && game.tick % 2 === 0) battle.typed++;
    }

    // ディール成立アニメ(電話 → 端末入力 → チケットがブックへ)
    if (battle.phase === "dealAnim") {
      battle.animT++;
      const t = battle.animT;
      if (t === 10 && !battle.animHit) {
        battle.animHit = true;
        const amount = battle.pending.amount;
        battle.book = Math.min(SIZE, battle.book + amount);
        battle.remaining = Math.max(0, SIZE - battle.book);
        if (amount > 0) {
          const investors = ["MEIJI AM", "KANTO BK", "SAKURA LIFE", "NORTH FUND", "CENTRAL AM"];
          battle.ticketName = investors[(battle.turn + amount) % investors.length];
          battle.ticketAmount = amount;
          battle.ticketT = ORDER_TICKET_DURATION;
          if (amount >= 15) { battle.dealFlash = 4; battle.screenShake = 4; }
        }
      }
      const resultFrame = battle.pending.amount > 0 ? ORDER_TICKET_DURATION : 48;
      if (t >= resultFrame) {
        battle.phase = "result";
        setPages(battle.pending.pages, function () {
          if (battle.book >= SIZE) { toWin(); return; }
          battle.turn++;
          if (game.stats.stamina <= 0) { toLose("stamina"); return; }
          if (battle.turn > battle.turnLimit) { toLose("time"); return; }
          toCommand();
        });
        battle.pending = null;
      }
    }
  }

  function loop() { update(); draw(); requestAnimationFrame(loop); }

  // =======================================================================
  //  入力
  // =======================================================================
  const UP=["ArrowUp","w","W"], DOWN=["ArrowDown","s","S"],
        LEFT=["ArrowLeft","a","A"], RIGHT=["ArrowRight","d","D"],
        OK=["Enter"," ","z","Z"];

  function startOpening() { game.mode = "opening"; op.start = performance.now(); }
  function finishOpening() { startBattle(); game.mode = "battle"; }

  function confirm() {
    if (game.mode === "title") { startOpening(); return; }
    if (game.mode === "opening") { finishOpening(); return; }
    if (game.mode === "ending") { game.mode = "title"; return; }
    if (battle.phase === "command") { chooseCommand(); return; }
    if (["intro","result","win","lose"].includes(battle.phase)) {
      if (battle.typed < pageLen()) { battle.typed = pageLen(); return; }
      if (battle.pi < battle.pages.length - 1) { battle.pi++; battle.typed = 0; return; }
      const n = battle.next; battle.next = null;
      if (n) n();
    }
  }

  window.addEventListener("keydown", function (e) {
    startAudio();
    if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key)) e.preventDefault();
    const k = e.key;
    if (game.mode === "opening" && k === "Escape") { finishOpening(); return; }
    if (game.mode === "ending" && k === "Escape") { game.mode = "title"; return; }
    if (game.mode === "battle" && battle.phase === "command") {
      if (UP.includes(k)) battle.cursor = (battle.cursor + COMMANDS.length - 2) % COMMANDS.length;
      else if (DOWN.includes(k)) battle.cursor = (battle.cursor + 2) % COMMANDS.length;
      else if (LEFT.includes(k)) battle.cursor = (battle.cursor + COMMANDS.length - 1) % COMMANDS.length;
      else if (RIGHT.includes(k)) battle.cursor = (battle.cursor + 1) % COMMANDS.length;
      else if (OK.includes(k)) confirm();
    } else {
      if (OK.includes(k)) confirm();
    }
  });
  function canvasPos(e) {
    const r = canvas.getBoundingClientRect();
    return { x: (e.clientX - r.left) / r.width * VW, y: (e.clientY - r.top) / r.height * VH };
  }
  function commandHitIndex(p) {
    for (let i = 0; i < COMMANDS.length; i++) {
      const cx = 8 + (i % 2) * 120;
      const cy = 191 + ((i / 2) | 0) * 13;
      if (p.x >= cx && p.x <= cx + 116 && p.y >= cy && p.y <= cy + 18) return i;
    }
    return -1;
  }
  window.addEventListener("pointerdown", function (e) {
    e.preventDefault();
    startAudio();
    // バトルのコマンド選択中はクリック位置で当たり判定(誤確定を防ぐ)
    if (game.mode === "battle" && battle.phase === "command") {
      const p = canvasPos(e);
      const hit = commandHitIndex(p);
      if (hit >= 0) {
        battle.cursor = hit; chooseCommand(); return;
      }
      return; // コマンド枠外のクリックは無視
    }
    confirm();
  }, { passive:false });
  window.addEventListener("touchmove", function (e) { e.preventDefault(); }, { passive:false });
  window.addEventListener("gesturestart", function (e) { e.preventDefault(); }, { passive:false });
  window.addEventListener("contextmenu", function (e) { e.preventDefault(); });

  const audio = { ctx:null, timer:null, step:0, track:"", master:null, noise:null };
  const TRACKS = {
    title: {
      step:148, vol:0.021,
      mel:["A4",null,null,"C5",null,"E5",null,null,"D5",null,"C5",null,"A4",null,null,null,
           "F4",null,"A4",null,"C5",null,"B4",null,"G4",null,"E4",null,"A4",null,null,null],
      bas:["A2",null,null,null,"A2",null,null,null,"F2",null,null,null,"F2",null,null,null,
           "C3",null,null,null,"G2",null,null,null,"E2",null,null,null,"A2",null,null,null],
      arp:["A3",null,"C4",null,"E4",null,"C4",null,"F3",null,"A3",null,"C4",null,"A3",null],
      drum:false
    },
    opening: {
      step:118, vol:0.028,
      mel:["A4",null,"C5","D5","E5",null,"D5","C5","A4",null,"G4","A4","C5",null,"D5",null,
           "E5",null,"G5","E5","D5",null,"C5","A4","G4",null,"A4","C5","D5",null,"E5",null],
      bas:["A2",null,"A2",null,"F2",null,"F2",null,"G2",null,"G2",null,"E2",null,"E2",null,
           "A2",null,"A2",null,"F2",null,"F2",null,"D2",null,"D2",null,"E2",null,"E2",null],
      arp:["A3","E4","A4","C5","F3","C4","F4","A4","G3","D4","G4","B4","E3","B3","E4","G4"],
      drum:true
    },
    battle: {
      step:118, vol:0.026,
      mel:["E5",null,"E5","G5",null,"A5",null,"E5","D5",null,"C5",null,"D5",null,"E5",null,
           "A4",null,"C5","E5",null,"G5",null,"E5","F5",null,"E5","D5",null,"B4",null,null],
      bas:["A2",null,"A2",null,"A2",null,"E2",null,"F2",null,"F2",null,"G2",null,"E2",null,
           "A2",null,"A2",null,"C3",null,"C3",null,"D3",null,"D3",null,"E2",null,"E2",null],
      arp:["A3",null,"C4",null,"E4",null,"C4",null,"F3",null,"A3",null,"C4",null,"A3",null],
      drum:true
    },
    win: {
      step:112, vol:0.03,
      mel:["C5","E5","G5","C6","B5","G5","E5","C5","D5","F5","A5","D6","C6","A5","G5",null,
           "E5","G5","C6","E6","D6","C6","A5","G5","C6",null,"G5",null,"E5",null,"C5",null],
      bas:["C3",null,"C3",null,"G2",null,"G2",null,"A2",null,"A2",null,"F2",null,"G2",null,
           "C3",null,"C3",null,"E3",null,"E3",null,"F3",null,"G3",null,"C3",null,"C3",null],
      arp:["C4","E4","G4","C5","G3","B3","D4","G4","A3","C4","E4","A4","F3","A3","C4","F4"],
      drum:true
    },
    lose: {
      step:150, vol:0.023,
      mel:["E4",null,"D4",null,"C4",null,"B3",null,"A3",null,"C4",null,"B3",null,null,null,
           "D4",null,"C4",null,"B3",null,"G3",null,"A3",null,null,null,"E3",null,null,null],
      bas:["A2",null,null,null,"F2",null,null,null,"D2",null,null,null,"E2",null,null,null,
           "A2",null,null,null,"F2",null,null,null,"D2",null,null,null,"E2",null,null,null],
      arp:["A3","C4","E4","C4","F3","A3","C4","A3","D3","F3","A3","F3","E3","G3","B3","G3"],
      drum:false
    }
  };
  function freq(n) {
    if (!n) return 0;
    const m = {C:-9,D:-7,E:-5,F:-4,G:-2,A:0,B:2};
    const mm = n.match(/^([A-G])(#?)(\d)$/); if (!mm) return 0;
    return 440 * Math.pow(2, (m[mm[1]] + (mm[2]?1:0) + (Number(mm[3])-4)*12) / 12);
  }
  function blip(note, time, len, vol, type) {
    if (!note) return;
    const o = audio.ctx.createOscillator(), g = audio.ctx.createGain();
    o.type = type || "square"; o.frequency.value = freq(note);
    g.gain.setValueAtTime(0.0001, time);
    g.gain.linearRampToValueAtTime(vol, time + 0.01);
    g.gain.setValueAtTime(vol, time + len*0.7);
    g.gain.linearRampToValueAtTime(0.0001, time + len);
    o.connect(g).connect(audio.master || audio.ctx.destination);
    o.start(time); o.stop(time + len);
  }
  function noteAt(seq, i) { return seq[i % seq.length]; }
  function curTrackName() {
    if (game.mode === "battle") return "battle";
    if (game.mode === "opening") return "opening";
    if (game.mode === "ending") return ending.result === "lose" ? "lose" : "win";
    return "title";
  }
  function makeNoise() {
    const len = audio.ctx.sampleRate / 2;
    const buf = audio.ctx.createBuffer(1, len, audio.ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    return buf;
  }
  function noiseHit(time, len, vol) {
    const src = audio.ctx.createBufferSource(), g = audio.ctx.createGain(), f = audio.ctx.createBiquadFilter();
    src.buffer = audio.noise;
    f.type = "highpass"; f.frequency.value = 1800;
    g.gain.setValueAtTime(vol, time);
    g.gain.exponentialRampToValueAtTime(0.0001, time + len);
    src.connect(f).connect(g).connect(audio.master);
    src.start(time); src.stop(time + len);
  }
  function kick(time, vol) {
    const o = audio.ctx.createOscillator(), g = audio.ctx.createGain();
    o.type = "triangle";
    o.frequency.setValueAtTime(90, time);
    o.frequency.exponentialRampToValueAtTime(38, time + 0.12);
    g.gain.setValueAtTime(vol, time);
    g.gain.exponentialRampToValueAtTime(0.0001, time + 0.14);
    o.connect(g).connect(audio.master);
    o.start(time); o.stop(time + 0.14);
  }
  function scheduleMusic() {
    if (!audio.ctx) return;
    const name = curTrackName();
    if (audio.track !== name) { audio.track = name; audio.step = 0; }
    const tr = TRACKS[name], i = audio.step, t = audio.ctx.currentTime + 0.035;
    const stepLen = tr.step / 1000;

    blip(noteAt(tr.bas, i), t, stepLen * 1.55, tr.vol * 0.78, "triangle");
    blip(noteAt(tr.arp, i), t + stepLen * 0.12, stepLen * 0.55, tr.vol * 0.22, "square");
    blip(noteAt(tr.mel, i), t, stepLen * 1.05, tr.vol, "square");

    if (tr.drum) {
      if (i % 8 === 0) kick(t, tr.vol * 2.2);
      if (i % 8 === 4) noiseHit(t, 0.065, tr.vol * 0.9);
      if (i % 4 === 2) noiseHit(t, 0.018, tr.vol * 0.22);
    }
    audio.step++;
    audio.timer = setTimeout(scheduleMusic, tr.step);
  }
  function startAudio() {
    if (audio.ctx) return;
    const AC = window.AudioContext || window.webkitAudioContext; if (!AC) return;
    audio.ctx = new AC();
    audio.master = audio.ctx.createGain();
    audio.master.gain.value = 0.38;
    audio.master.connect(audio.ctx.destination);
    audio.noise = makeNoise();
    if (audio.ctx.state === "suspended") audio.ctx.resume();
    scheduleMusic();
  }

  // =======================================================================
  //  起動
  // =======================================================================
  game.mode = "title";       // タイトル -> オープニング -> バトル
  requestAnimationFrame(loop);
  </script>
