      margin: 0;

      height: 100%;
      min-height: 100%;
      background: #000;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: var(--app-height, 100svh);
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      box-sizing: border-box;
    }
    canvas {
      width: min(768px, 100vw, calc(var(--app-height, 100svh) * 256 / 224));
      height: auto;
      max-height: var(--app-height, 100svh);
      aspect-ratio: 256 / 224;
      background: #000;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
      touch-action: none;
    }
    @media (max-width: 430px) and (orientation: portrait) {
      body {
        align-items: flex-start;
        justify-content: center;
        padding-top: max(env(safe-area-inset-top), 6px);
      }
      canvas {
        width: 100vw;
        max-width: 100vw;
        margin-top: 0;
      }
    }
    @media (max-width: 430px) and (orientation: landscape) {
      canvas {
        width: auto;
        height: var(--app-height, 100svh);
        max-width: 100vw;
      }
    }
  </style>

    ctx.fillStyle = color || C.frame;
    ctx.font = (size||10) + "px 'MS Gothic','Courier New',monospace";
    ctx.textBaseline = "top";

  function drawArt(art, x, y, pal, scale, tint) {
    scale = scale || 1;
    for (let r = 0; r < art.length; r++) {
      const row = art[r]; if (!row) continue;
      for (let c = 0; c < row.length; c++) {
        const base = pal[row[c]];
        if (base) rect(x + c*scale, y + r*scale, scale, scale, tint || base);
      }
    }
  }

    { id:"tighten",   label:"タイトニング" },   // 気力回復(需要↓)

    remaining: SIZE,           // 未販売残高。約定のたびに100億円から減る

  function setPages(pages, next) { battle.pages = pages; battle.pi = 0; battle.typed = 0; battle.next = next || null; }
  function curPage() { return battle.pages[battle.pi] || ["", ""]; }
  function pageLen() { const p = curPage(); return (p[0]||"").length + (p[1]||"").length; }

  function applyStat(obj) {
    for (const k in obj) {
      const max = STAT_MAX[k] || 999;
      game.stats[k] = Math.max(0, Math.min(max, (game.stats[k]||0) + obj[k]));
    }
  }

  function startBattle() {
    battle.book = 0; battle.shown = 0;
    battle.remaining = SIZE; battle.shownRemaining = SIZE;
    battle.rate = 5; battle.trend = 0; battle.turn = 1;
    battle.cursor = 0; battle.phase = "intro";
    battle.pending = null; battle.animT = 0; battle.animHit = false;
    battle.enemyShake = 0; battle.enemyFlash = 0; battle.heroLunge = 0; battle.heroFlash = 0; battle.screenShake = 0;
    battle.burst = 0; battle.hitFlash = 0; battle.dmgValue = 0; battle.dmgT = 0;
    game.stats = { stamina:102, nemawashi:36, review:25, demand:0, trust:40, spread:115, market:55 };
    setPages([
      ["100億円 シニア社債の マンデート！", ""],
      ["販売残高は 100億円。", "投資家オーダーで 完売をめざせ。"],
      ["条件を動かせば 需要も動く。", "主幹事の腕の 見せどころだ。"]
    ], toCommand);
  }
  function toCommand() {
    battle.phase = "command";
    setPages([["コマンドを えらべ。", ""]], null);
  }

  // -------------------------------------------------- コマンド(ブックビルディング)
  function resolveCommand(id) {
    applyStat({ stamina:-2 });          // 1ターンの基礎消耗(時間経過)
    let imm = 0;                        // このターンの追加オーダー(億)
    let pages = [];

    if (id === "widen") {
      applyStat({ stamina:-9, spread:5 });
      battle.rate = Math.min(16, battle.rate + 3);
      battle.trend = 1;
      pages = [["スプレッドを ワイドに 振った！", ""],
               ["気力 -9 ／ 需要トレンド ↑", ""]];
    } else if (id === "tighten") {
      applyStat({ stamina:11, spread:-5 });
      battle.rate = Math.max(0, battle.rate - 3);
      battle.trend = -1;
      pages = [["スプレッドを タイトに 寄せた", ""],
               ["気力 回復 ／ 需要トレンド ↓", ""]];
    } else if (id === "explain") {
      applyStat({ stamina:-3, trust:4 });
      battle.rate = Math.min(16, battle.rate + 1);
      battle.trend = 1; imm = 2;
      pages = [["ロードショーで 投資家を 口説いた", ""],
               ["発行体信頼が あがった", ""]];
    } else if (id === "nemawashi") {
      if (game.stats.nemawashi < 5) {
        battle.pending = { dmg:0, noTurn:true,
          pages:[["ディールを 組むには", "根回し力が たりない！"]] };
        return;
      }
      applyStat({ stamina:-4, nemawashi:-5 });
      battle.trend = 0; imm = 10;
      pages = [["ディールがまとまり はじめた！", ""],
               ["まとまった オーダーが 入った", ""]];
    }

    // このターンに入る投資家オーダー(億)
    let orders = battle.rate + imm + ((Math.random()*3) | 0);
    orders = Math.min(battle.remaining, Math.max(0, orders));
    applyStat({ demand: orders });
    const after = battle.book + orders;
    const remainAfter = Math.max(0, SIZE - after);
    battle.pending = {
      dmg: orders,
      pages: pages.concat([[
        "投資家オーダー +" + orders + "億円",
        "販売残高 " + remainAfter + "億円"
      ]])
    };
  }

  function chooseCommand() {
    resolveCommand(COMMANDS[battle.cursor].id);
    if (battle.pending && battle.pending.noTurn) {
      battle.phase = "result";
      setPages(battle.pending.pages, function () { toCommand(); });
      battle.pending = null;
      return;
    }
    battle.phase = "playerAnim";
    battle.animT = 0; battle.animHit = false;
  }

  function toWin() {
    battle.phase = "win";
    setPages([
      ["販売残高 0億円！", ""],
      ["100億円 完売 ―― 起債 成立！", ""]
    ], function () { startEnding("win"); });
  }
  function toLose(reason) {
    battle.phase = "lose";
    ending.reason = reason;
    const head = reason === "time" ? ["条件決定の機を のがした……", "(ターン切れ)"]
                                   : ["気力が つきはてた……", ""];
    setPages([
      head,
      ["案件は いったん 見送りに……", ""]
    ], function () { startEnding("lose"); });
  }

  // ------------------------------------------------- 攻撃エフェクト(白爆発+紫ギザ縁)
  function fillDiamond(cx, cy, r, color) {
    ctx.fillStyle = color;
    for (let dy = -r; dy <= r; dy++) {
      const half = r - Math.abs(dy);
      ctx.fillRect(cx - half, cy + dy, half * 2 + 1, 1);
    }
  }
  function drawBurst(cx, cy, r) {
    fillDiamond(cx, cy, r + 3, C.purple || "#a855f7");   // 紫の外縁
    fillDiamond(cx, cy, r, "#f8f8f8");                    // 白い芯
    // 4方向のスパイク
    ctx.fillStyle = "#f8f8f8";
    for (let i = 1; i <= 3; i++) {
      const d = r + 2 + i * 3;
      ctx.fillRect(cx - 1, cy - d, 2, 3);
      ctx.fillRect(cx - 1, cy + d - 2, 2, 3);
      ctx.fillRect(cx - d, cy - 1, 3, 2);
      ctx.fillRect(cx + d - 2, cy - 1, 3, 2);
    }
  }
  function drawNumber(str, x, y, color) {
    ctx.font = "bold 12px 'MS Gothic','Courier New',monospace";
    ctx.textBaseline = "top";
    ctx.fillStyle = "#1b0e05";
    ctx.fillText(str, x-1, y); ctx.fillText(str, x+1, y);
    ctx.fillText(str, x, y-1); ctx.fillText(str, x, y+1);
    ctx.fillStyle = color;
    ctx.fillText(str, x, y);
  }
  function drawEffects() {
    if (battle.burst > 0) {
      const p = 1 - battle.burst / 13;
      drawBurst(64, 66, 8 + Math.round(p * 32));
    }
    if (battle.dmgT > 0) {
      const up = 24 - battle.dmgT;
      drawNumber("▲" + battle.dmgValue + "億", 92, 38 - up, "#fff0a8");
    }
    if (battle.hitFlash > 0) {
      ctx.fillStyle = "rgba(248,248,248,0.35)";
      ctx.fillRect(0, 0, VW, 128);
    }
  }

  // =======================================================================
  //  描画: タイトル / オープニング(オリジナル16bit JRPG風)
  // =======================================================================
  function titleDither(x, y, w, h, c1, c2, step, phase) {
    // 低解像度に見せるためではなく、SFC風に大面積の色面を分割する粒状パターン。
    for (let yy = y; yy < y + h; yy += step) {
      for (let xx = x + ((yy + phase) % (step * 2) === 0 ? 0 : step); xx < x + w; xx += step * 2) {
        rect(xx, yy, 1, 1, ((xx + yy + phase) % 3) ? c1 : c2);
      }
    }
  }

  // スクロールするビル群(パララックス)
  function skyline(baseY, h0, h1, col, winCol, off, bw, gap) {
    const period = bw + gap;
    let start = -((off % period + period) % period);
    for (let x = start; x < VW; x += period) {
      const idx = Math.floor((x + off) / period);
      const h = h0 + (Math.abs(idx * 53) % (h1 - h0));
      rect(x, baseY - h, bw, h, col);
      for (let wy = baseY - h + 3; wy < baseY - 3; wy += 6) {
        for (let wx = x + 2; wx < x + bw - 2; wx += 5) {
          const lit = ((idx * 7 + wy + wx + (game.tick >> 4)) % 5) < 2;
          rect(wx, wy, 2, 3, lit ? winCol : "#0c1230");
        }
      }
    }
  }

  // フェード用の黒幕(シーン開始/終了)
  function sceneFade(e, dur) {
    const fin = Math.min(1, e / 0.4);
    const fout = Math.min(1, Math.max(0, (dur - e) / 0.4));
    const a = 1 - Math.min(fin, fout);
    if (a > 0.01) { ctx.fillStyle = "rgba(0,0,0," + a + ")"; ctx.fillRect(0, 0, VW, VH); }
  }

    // 塔(両脇＋中央)
    const tw = [-1 * s, 5 * s, W - s + s];
    for (let t = 0; t < 3; t++) {
      const tx = x + (t === 0 ? -s : t === 1 ? 5 * s : W - s);
      rect(tx, y + 1 * s, 2 * s, 13 * s, "#454c78");
      rect(tx, y, 2 * s, s, "#2a2f50");
      rect(tx - s * 0.5, y - 2 * s, 3 * s, s, "#3b4168");

      const wav = (game.tick >> 3) % 2;
      rect(tx + s * 2, y - 4 * s + wav, 3 * s, 2 * s, "#ef4444");
    }
    // 窓(ちらつき)
    for (let r = 0; r < 3; r++) for (let c = 0; c < 4; c++) {

    rect(x + W / 2 - s, y + 10 * s, 2 * s, s, "#ffd24a");

  // =======================================================================
  //  更新
  // =======================================================================
  function update() {
    game.tick++;
    game.now = performance.now();

    if (game.mode === "opening") {
      if (game.now - op.start >= OP_DUR) finishOpening();
      return;
    }
    if (game.mode === "ending") {
      // 自動では進めない。最後の画面で停止し、ENTER/クリックでタイトルへ。
      return;
    }
    if (game.mode === "title") return;

    // ゲージのなめらか減少
    if (battle.shown < battle.book) battle.shown = Math.min(battle.book, battle.shown + 1.8);
    else if (battle.shown > battle.book) battle.shown = battle.book;
    if (battle.shownRemaining > battle.remaining) battle.shownRemaining = Math.max(battle.remaining, battle.shownRemaining - 1.8);
    else if (battle.shownRemaining < battle.remaining) battle.shownRemaining = battle.remaining;

    // 各種演出タイマー
    if (battle.enemyShake > 0) battle.enemyShake--;
    if (battle.enemyFlash > 0) battle.enemyFlash--;
    if (battle.heroFlash > 0) battle.heroFlash--;
    if (battle.screenShake > 0) battle.screenShake--;
    if (battle.burst > 0) battle.burst--;
    if (battle.hitFlash > 0) battle.hitFlash--;
    if (battle.dmgT > 0) battle.dmgT--;

    // タイプライター送り
    if (["intro","result","enemyAnim","win","lose"].includes(battle.phase)) {
      if (battle.typed < pageLen() && game.tick % 2 === 0) battle.typed++;
    }

    // プレイヤー攻撃アニメ(前に出る → 命中 → 戻る → 結果)
    if (battle.phase === "playerAnim") {
      battle.animT++;
      const t = battle.animT;
      if (t <= 8) battle.heroLunge = t * 3;          // 前へ
      else if (t <= 16) battle.heroLunge = (16 - t) * 3; // 戻る
      else battle.heroLunge = 0;

      if (t === 8 && !battle.animHit) {
        battle.animHit = true;
        const dmg = battle.pending.dmg;
        battle.book = Math.min(SIZE, battle.book + dmg);
        battle.remaining = Math.max(0, SIZE - battle.book);
        battle.enemyFlash = 8;
        battle.enemyShake = 12;
        if (dmg > 0) {
          battle.burst = 13; battle.hitFlash = 3;
          battle.dmgValue = dmg; battle.dmgT = 24;
          battle.screenShake = 6;
        }
      }
      if (t >= 18) {
        battle.heroLunge = 0;
        battle.phase = "result";
        setPages(battle.pending.pages, function () {
          if (battle.book >= SIZE) { toWin(); return; }
          battle.turn++;
          if (game.stats.stamina <= 0) { toLose("stamina"); return; }
          if (battle.turn > battle.turnLimit) { toLose("time"); return; }
          toCommand();
        });
        battle.pending = null;
      }
    }
  }

  function loop() { update(); draw(); requestAnimationFrame(loop); }

  const UP=["ArrowUp","w","W"], DOWN=["ArrowDown","s","S"],

  function startOpening() { game.mode = "opening"; op.start = performance.now(); }

  function confirm() {
    if (game.mode === "title") { startOpening(); return; }
    if (game.mode === "opening") { finishOpening(); return; }
    if (game.mode === "ending") { game.mode = "title"; return; }
    if (battle.phase === "command") { chooseCommand(); return; }
    if (["intro","result","enemyAnim","win","lose"].includes(battle.phase)) {
      if (battle.typed < pageLen()) { battle.typed = pageLen(); return; }
      if (battle.pi < battle.pages.length - 1) { battle.pi++; battle.typed = 0; return; }
      const n = battle.next; battle.next = null;
      if (n) n();
    }
  }

  window.addEventListener("keydown", function (e) {
    startAudio();
    if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key)) e.preventDefault();
    const k = e.key;
    if (game.mode === "opening" && k === "Escape") { finishOpening(); return; }
    if (game.mode === "ending" && k === "Escape") { game.mode = "title"; return; }
    if (game.mode === "battle" && battle.phase === "command") {
      if (UP.includes(k)) battle.cursor = (battle.cursor + COMMANDS.length - 2) % COMMANDS.length;
      else if (DOWN.includes(k)) battle.cursor = (battle.cursor + 2) % COMMANDS.length;
      else if (LEFT.includes(k)) battle.cursor = (battle.cursor + COMMANDS.length - 1) % COMMANDS.length;
      else if (RIGHT.includes(k)) battle.cursor = (battle.cursor + 1) % COMMANDS.length;
      else if (OK.includes(k)) confirm();
    } else {
      if (OK.includes(k)) confirm();
    }

           "C3",null,"C3",null,"E3",null,"E3",null,"F3",null,"G3",null,"C3",null,"C3",null],
      arp:["C4","E4","G4","C5","G3","B3","D4","G4","A3","C4","E4","A4","F3","A3","C4","F4"],
      drum:true
    },
    lose: {
      step:150, vol:0.023,
      mel:["E4",null,"D4",null,"C4",null,"B3",null,"A3",null,"C4",null,"B3",null,null,null,
           "D4",null,"C4",null,"B3",null,"G3",null,"A3",null,null,null,"E3",null,null,null],
      bas:["A2",null,null,null,"F2",null,null,null,"D2",null,null,null,"E2",null,null,null,
           "A2",null,null,null,"F2",null,null,null,"D2",null,null,null,"E2",null,null,null],
      arp:["A3","C4","E4","C4","F3","A3","C4","A3","D3","F3","A3","F3","E3","G3","B3","G3"],
      drum:false
    }
  };
  function freq(n) {
    if (!n) return 0;
    const m = {C:-9,D:-7,E:-5,F:-4,G:-2,A:0,B:2};
    const mm = n.match(/^([A-G])(#?)(\d)$/); if (!mm) return 0;
    return 440 * Math.pow(2, (m[mm[1]] + (mm[2]?1:0) + (Number(mm[3])-4)*12) / 12);
  }
  function blip(note, time, len, vol, type) {
    if (!note) return;
    const o = audio.ctx.createOscillator(), g = audio.ctx.createGain();
    o.type = type || "square"; o.frequency.value = freq(note);
    g.gain.setValueAtTime(0.0001, time);
    g.gain.linearRampToValueAtTime(vol, time + 0.01);
    g.gain.setValueAtTime(vol, time + len*0.7);
    g.gain.linearRampToValueAtTime(0.0001, time + len);
    o.connect(g).connect(audio.master || audio.ctx.destination);
    o.start(time); o.stop(time + len);
  }
  function noteAt(seq, i) { return seq[i % seq.length]; }
  function curTrackName() {
    if (game.mode === "battle") return "battle";
    if (game.mode === "opening") return "opening";
    if (game.mode === "ending") return ending.result === "lose" ? "lose" : "win";
    return "title";
  }
  function makeNoise() {
    const len = audio.ctx.sampleRate / 2;
    const buf = audio.ctx.createBuffer(1, len, audio.ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    return buf;
  }
  function noiseHit(time, len, vol) {
    const src = audio.ctx.createBufferSource(), g = audio.ctx.createGain(), f = audio.ctx.createBiquadFilter();
    src.buffer = audio.noise;
    f.type = "highpass"; f.frequency.value = 1800;
    g.gain.setValueAtTime(vol, time);
    g.gain.exponentialRampToValueAtTime(0.0001, time + len);
    src.connect(f).connect(g).connect(audio.master);
    src.start(time); src.stop(time + len);
  }
  function kick(time, vol) {
    const o = audio.ctx.createOscillator(), g = audio.ctx.createGain();
    o.type = "triangle";
    o.frequency.setValueAtTime(90, time);
    o.frequency.exponentialRampToValueAtTime(38, time + 0.12);
    g.gain.setValueAtTime(vol, time);
    g.gain.exponentialRampToValueAtTime(0.0001, time + 0.14);
    o.connect(g).connect(audio.master);
    o.start(time); o.stop(time + 0.14);
  }
  function scheduleMusic() {
    if (!audio.ctx) return;
    const name = curTrackName();
    if (audio.track !== name) { audio.track = name; audio.step = 0; }
    const tr = TRACKS[name], i = audio.step, t = audio.ctx.currentTime + 0.035;
    const stepLen = tr.step / 1000;

    blip(noteAt(tr.bas, i), t, stepLen * 1.55, tr.vol * 0.78, "triangle");
    blip(noteAt(tr.arp, i), t + stepLen * 0.12, stepLen * 0.55, tr.vol * 0.22, "square");
    blip(noteAt(tr.mel, i), t, stepLen * 1.05, tr.vol, "square");

    if (tr.drum) {
      if (i % 8 === 0) kick(t, tr.vol * 2.2);
      if (i % 8 === 4) noiseHit(t, 0.065, tr.vol * 0.9);
      if (i % 4 === 2) noiseHit(t, 0.018, tr.vol * 0.22);
    }
    audio.step++;
    audio.timer = setTimeout(scheduleMusic, tr.step);
  }
  function startAudio() {
    if (audio.ctx) return;
    const AC = window.AudioContext || window.webkitAudioContext; if (!AC) return;
    audio.ctx = new AC();
    audio.master = audio.ctx.createGain();
    audio.master.gain.value = 0.38;
    audio.master.connect(audio.ctx.destination);
    audio.noise = makeNoise();
    if (audio.ctx.state === "suspended") audio.ctx.resume();
    scheduleMusic();
  }

  // =======================================================================
  //  起動
  // =======================================================================
  game.mode = "title";       // タイトル -> オープニング -> バトル
  requestAnimationFrame(loop);
  </script>
</body>
</html>
